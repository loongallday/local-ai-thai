<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0a0e1a"/>
  <!--
    Option 2: "Infinity Shield"
    A continuous loop/infinity shape inside a subtle shield outline
    Represents: infinite AI (no subscription limit) + protection (local/private)
  -->
  <!-- Infinity / figure-8 path -->
  <path d="M256 200
    C 310 200, 370 160, 370 230
    C 370 300, 310 300, 256 260
    C 202 300, 142 300, 142 230
    C 142 160, 202 200, 256 200 Z"
    fill="none" stroke="url(#g2)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center dot where paths cross -->
  <circle cx="256" cy="230" r="10" fill="url(#g2)"/>
  <!-- Subtle base line -->
  <line x1="170" y1="370" x2="342" y2="370" stroke="url(#g2)" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
